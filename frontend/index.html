<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conversation Copilot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0b1020;
      --panel: #111827;
      --panel-soft: #121b2f;
      --text: #eef2ff;
      --muted: #94a3b8;
      --line: #263247;
      --line-strong: #3b82f6;
      --accent: #60a5fa;
      --error: #f87171;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.14), transparent 36rem),
        var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
      line-height: 1.6;
      padding: 56px 20px;
    }

    .app {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 44px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.25rem);
      line-height: 1.1;
      letter-spacing: -0.05em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1.05rem;
      margin-top: 12px;
    }

    .input-section {
      display: grid;
      gap: 16px;
      margin-bottom: 34px;
    }

    textarea {
      width: 100%;
      min-height: 170px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(17, 24, 39, 0.88);
      color: var(--text);
      font: inherit;
      font-size: 1rem;
      padding: 18px 20px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea::placeholder {
      color: #64748b;
    }

    textarea:focus {
      border-color: rgba(96, 165, 250, 0.75);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.14);
    }

    button {
      justify-self: start;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: #06101f;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      padding: 12px 24px;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:hover:not(:disabled) {
      opacity: 0.92;
    }

    button:active:not(:disabled) {
      transform: translateY(1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .divider {
      height: 1px;
      background: var(--line);
      margin: 0 0 28px;
    }

    .state {
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 18px;
    }

    .state.error {
      color: var(--error);
      white-space: pre-line;
    }

    .speed {
      color: #64748b;
      font-size: 0.82rem;
      font-weight: 400;
      margin-bottom: 18px;
    }

    .results {
      display: none;
      gap: 16px;
    }

    .results.show {
      display: grid;
    }

    .card {
      background: rgba(17, 24, 39, 0.78);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
    }

    .card h2 {
      font-size: 0.92rem;
      letter-spacing: 0.02em;
      margin-bottom: 10px;
    }

    .card p {
      color: #dbeafe;
      font-size: 1rem;
    }

    .reply-card {
      background: rgba(59, 130, 246, 0.1);
      border-color: rgba(96, 165, 250, 0.55);
    }

    .reply-card p {
      color: var(--text);
      font-size: 1.28rem;
      font-weight: 600;
      line-height: 1.45;
    }

    @media (max-width: 560px) {
      body {
        padding: 36px 16px;
      }

      button {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Conversation Copilot</h1>
      <p class="subtitle">Understand intent.<br />Respond faster.</p>
    </header>

    <section class="input-section" aria-label="Analyze message">
      <button id="record" type="button">Enable Microphone</button>
      <p class="speed">Mic stays on. Analysis runs after ~1s silence.</p>
    </section>

    <div class="divider"></div>

    <p id="state" class="state">Enable microphone to start listening.</p>
    <p id="speed" class="speed"></p>

    <section id="results" class="results" aria-live="polite">
      <article class="card">
        <h2>🧠 Intent</h2>
        <p id="intent"></p>
      </article>

      <article class="card">
        <h2>📌 Summary</h2>
        <p id="summary"></p>
      </article>

      <article class="card reply-card">
        <h2>💬 Suggested Reply</h2>
        <p id="reply"></p>
      </article>
    </section>
  </main>

  <script>
    const recordButton = document.getElementById('record');
    const state = document.getElementById('state');
    const results = document.getElementById('results');
    const intent = document.getElementById('intent');
    const summary = document.getElementById('summary');
    const reply = document.getElementById('reply');
    const speed = document.getElementById('speed');

    let mediaRecorder;
    let audioChunks = [];
    let silenceTimer = null;
    let isAnalyzing = false;
    let hasSpeech = false;
    const silenceMs = 1000;
    const volumeThreshold = 0.035;

    function setState(text, isError = false) {
      state.textContent = text;
      state.className = isError ? 'state error' : 'state';
      if (isError) speed.textContent = '';
    }

    function setSpeed(ms) {
      speed.textContent = `Analysis took ${ms}ms.`;
    }

    function showResults(data) {
      intent.textContent = data.intent || '—';
      summary.textContent = data.summary || '—';
      reply.textContent = data.reply || '—';
      results.classList.add('show');
    }

    recordButton.addEventListener('click', async () => {
      results.classList.remove('show');
      setState('Waiting for microphone...');

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        startVoiceDetection(stream);
        recordButton.disabled = true;
        recordButton.textContent = 'Microphone Enabled';
        setState('Listening...');
      } catch (err) {
        setState(`Error accessing microphone: ${err.message}`, true);
      }
    });

    function startVoiceDetection(stream) {
      const audioContext = new AudioContext();
      const source = audioContext.createMediaStreamSource(stream);
      const analyser = audioContext.createAnalyser();
      const data = new Uint8Array(analyser.fftSize);

      source.connect(analyser);
      startNewRecording(stream);

      function detect() {
        analyser.getByteTimeDomainData(data);

        let sum = 0;
        for (const value of data) {
          const centered = value - 128;
          sum += centered * centered;
        }

        const volume = Math.sqrt(sum / data.length) / 128;

        if (volume > volumeThreshold && !isAnalyzing) {
          hasSpeech = true;
          clearTimeout(silenceTimer);
          silenceTimer = null;
          if (!mediaRecorder || mediaRecorder.state !== 'recording') {
            startNewRecording(stream);
          }
          setState('Listening...');
        } else if (hasSpeech && mediaRecorder?.state === 'recording' && audioChunks.length && !silenceTimer) {
          silenceTimer = setTimeout(() => {
            silenceTimer = null;
            stopCurrentRecording();
          }, silenceMs);
        }

        requestAnimationFrame(detect);
      }

      detect();
    }

    function startNewRecording(stream) {
      hasSpeech = false;
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream);

      mediaRecorder.ondataavailable = event => {
        if (event.data.size > 0) audioChunks.push(event.data);
      };

      mediaRecorder.onstop = async () => {
        if (!audioChunks.length) return;
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        await sendAudioForAnalysis(audioBlob);
      };

      mediaRecorder.start(250);
    }

    function stopCurrentRecording() {
      if (mediaRecorder?.state === 'recording') {
        setState('Analyzing audio...');
        mediaRecorder.stop();
      }
    }

    async function sendAudioForAnalysis(audioBlob) {
      isAnalyzing = true;
      const startTime = performance.now();

      try {
        const formData = new FormData();
        formData.append('audio', audioBlob, 'audio.webm');

        const response = await fetch('/analyze_audio', {
          method: 'POST',
          body: formData
        });

        if (!response.ok) throw new Error('Request failed');

        const data = await response.json();
        if (data.error) throw new Error(data.error);

        const endTime = performance.now();
        setState('');
        setSpeed(Math.round(endTime - startTime));
        showResults(data);
      } catch (err) {
        setState(`Something went wrong: ${err.message}`, true);
      } finally {
        isAnalyzing = false;
        if (mediaRecorder?.stream?.active) {
          startNewRecording(mediaRecorder.stream);
          setState('Listening...');
        }
      }
    }
  </script>
</body>
</html>
